version: "3.9"

services:
  # ─── FastAPI Backend ─────────────────────────────────────────
  api:
    build: ./backend
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      - redis
    volumes:
      - ./backend:/app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    restart: unless-stopped

  # ─── Celery Worker ───────────────────────────────────────────
  worker:
    build: ./backend
    env_file:
      - .env
    environment:
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      - redis
      - api
    volumes:
      - ./backend:/app
    command: celery -A workers.celery_app worker --loglevel=info --concurrency=4
    restart: unless-stopped

  # ─── Celery Beat (Scheduler) ─────────────────────────────────
  beat:
    build: ./backend
    env_file:
      - .env
    environment:
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      - redis
      - worker
    volumes:
      - ./backend:/app
    command: celery -A workers.celery_app beat --loglevel=info
    restart: unless-stopped

  # ─── Redis ───────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    restart: unless-stopped

  # ─── Flower (Celery monitoring) ──────────────────────────────
  flower:
    build: ./backend
    env_file:
      - .env
    environment:
      - REDIS_URL=redis://redis:6379/0
    ports:
      - "5555:5555"
    depends_on:
      - redis
      - worker
    command: celery -A workers.celery_app flower --port=5555
    restart: unless-stopped

volumes:
  redis_data:
