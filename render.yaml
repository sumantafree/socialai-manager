##############################################################
# SocialAI Manager — Render Blueprint
# Deploys: backend API (FastAPI + Gunicorn),
#          celery worker, celery beat, redis
# Frontend is deployed on Vercel (see vercel.json)
# Docs: https://render.com/docs/blueprint-spec
##############################################################

services:

  # ── Backend API ──────────────────────────────────────────────
  - type: web
    name: socialai-api
    runtime: python
    plan: free
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app.main:app -k uvicorn.workers.UvicornWorker -w 2 --bind 0.0.0.0:$PORT --timeout 120
    healthCheckPath: /health
    envVars:
      - key: APP_ENV
        value: production
      - key: DEBUG
        value: "false"
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: SUPABASE_ANON_KEY
        sync: false
      # ── AI Provider (Gemini as primary) ──
      - key: AI_PROVIDER
        value: gemini
      - key: AI_MODEL_GEMINI
        value: gemini-1.5-flash
      - key: GEMINI_API_KEY
        sync: false
      - key: OPENAI_API_KEY
        sync: false           # Optional fallback
      - key: ANTHROPIC_API_KEY
        sync: false           # Optional fallback
      # ── Admin ──
      - key: ADMIN_SECRET_KEY
        sync: false           # Set a strong random string
      # ── Stripe ──
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: STRIPE_WEBHOOK_SECRET
        sync: false
      - key: STRIPE_PRO_PRICE_ID
        sync: false
      - key: STRIPE_AGENCY_PRICE_ID
        sync: false
      # ── Redis / Celery ──
      - key: REDIS_URL
        fromService:
          type: redis
          name: socialai-redis
          property: connectionString
      # ── CORS (comma-separated) ──
      - key: BACKEND_CORS_ORIGINS
        sync: false           # https://yourdomain.com,https://socialai-xyz.vercel.app
      # ── Social APIs ──
      - key: TWILIO_ACCOUNT_SID
        sync: false
      - key: TWILIO_AUTH_TOKEN
        sync: false
      - key: TWILIO_WHATSAPP_FROM
        sync: false
      - key: INSTAGRAM_APP_ID
        sync: false
      - key: INSTAGRAM_APP_SECRET
        sync: false
      - key: TWITTER_API_KEY
        sync: false
      - key: TWITTER_API_SECRET
        sync: false
      - key: TWITTER_BEARER_TOKEN
        sync: false
      - key: LINKEDIN_CLIENT_ID
        sync: false
      - key: LINKEDIN_CLIENT_SECRET
        sync: false

  # ── Celery Worker ─────────────────────────────────────────────
  - type: worker
    name: socialai-worker
    runtime: python
    plan: free
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: celery -A workers.celery_app worker --loglevel=info --concurrency=2
    envVars:
      - key: APP_ENV
        value: production
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: AI_PROVIDER
        value: gemini
      - key: GEMINI_API_KEY
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: REDIS_URL
        fromService:
          type: redis
          name: socialai-redis
          property: connectionString
      - key: TWILIO_ACCOUNT_SID
        sync: false
      - key: TWILIO_AUTH_TOKEN
        sync: false
      - key: TWILIO_WHATSAPP_FROM
        sync: false

  # ── Celery Beat (Scheduler) ────────────────────────────────────
  - type: worker
    name: socialai-beat
    runtime: python
    plan: free
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: celery -A workers.celery_app beat --loglevel=info --scheduler celery.beat.PersistentScheduler
    envVars:
      - key: APP_ENV
        value: production
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: REDIS_URL
        fromService:
          type: redis
          name: socialai-redis
          property: connectionString

  # ── Redis ──────────────────────────────────────────────────────
  - type: redis
    name: socialai-redis
    plan: free
    maxmemoryPolicy: noeviction
    ipAllowList: []
